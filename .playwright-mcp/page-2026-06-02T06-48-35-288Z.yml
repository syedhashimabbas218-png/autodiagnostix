                - article [ref=e133]:
                  - button "CNC605+ GDI Injector Cleaner & Tester" [ref=e139]:
                    - img "CNC605+ GDI Injector Cleaner & Tester" [ref=e151]
                  - generic [ref=e152]:
                    - heading "CNC605+ GDI Injector Cleaner & Tester" [level=1] [ref=e154]
                    - generic [ref=e157]:
                      - generic [ref=e159]:
                        - text: $2,280.00
                        - generic [ref=e160]: Price
                      - generic [ref=e161]: Excluding GST
                    - paragraph [ref=e168]: CNC605+ is a cleaning and testing equipment suitable for piezoelectric (140V), GDI (65V/12V) and conventional fuel injectors. It uses ultrasonic cleaning technology combined with microprocessor oil pressure control technology to simulate various engine working conditions and clean and test automobile fuel injectors.
                    - button "Add To Cart" [ref=e172] [cursor=pointer]:
                      - generic [ref=e173]: Add To Cart
              - list [ref=e179]:
                - listitem [ref=e180]:
                  - button "Features:" [expanded] [ref=e181] [cursor=pointer]:
                    - paragraph [ref=e182]: "Features:"
                    - img [ref=e184]
                  - generic [ref=e196]:
                    - paragraph [ref=e197]: 1.Support the cleaning and testing of all types of injectors (PIEZO, GDI, conventional injectors) under safe oil pressure.
                    - paragraph [ref=e198]: 2.The use of ultrasonic strong cleaning technology can completely remove carbon deposits on the fuel injector and filter deposits.
                    - paragraph [ref=e199]: 3.Utilizes microcomputer automatic control technology for automatic control of the cleaning and testing process, and real-time monitoring of the key performance of the fuel injectors.
                    - paragraph [ref=e200]: 4.Equipped with various non-dismantle cleaning connectors, capable of non-dismantle cleaning and maintenance for multiple vehicle models.
                    - paragraph [ref=e201]: 5.Optional side-feed injector kit available.
                    - paragraph [ref=e202]: 6.Through simulating engine operating conditions, comprehensively tests various aspects of the fuel injector's performance.
                    - paragraph [ref=e203]: 7.Equipped with a 7-inch colour screen, the display is more intuitive, and the operation is more convenient.
                - listitem [ref=e204]:
                  - button "Functions:" [ref=e205] [cursor=pointer]:
                    - paragraph [ref=e206]: "Functions:"
                    - img [ref=e208]
                  - generic [ref=e215]:
                    - paragraph [ref=e216]: "1. Working mode selection: Can select EFI (12V), GDI (65V) or PIEZO (140V) operating mode based on the injector type."
                    - paragraph [ref=e217]: "2. Ultrasonic Cleaning: Capable of simultaneously ultrasonic cleaning multiple injectors, effectively removing carbon buildup."
                    - paragraph [ref=e218]: "3. Sealing Test Function: Tests the sealing and leakage of injectors under system pressure."
                    - paragraph [ref=e219]: "4. Uniformity/Spray Testing Function: Detects the uniformity of fuel injection quantity for each injector and the spray atomization of the injector can be comprehensively and carefully observed using the background light."
                    - paragraph [ref=e220]: "5. Fuel Injection Quantity Detection Function: Measures the fuel injection quantity of injectors under a constant 15-second injection condition."
                    - paragraph [ref=e221]: "6. Automatic Cleaning and Testing Function: Under specific working parameters, realistically simulates injector testing under various conditions."
                    - paragraph [ref=e222]: "7. Reverse Flush Function: For the uniformity/spray testing item, performs a reverse flush using a reverse flush adapter to remove internal injector contaminants and residues attached to the filter screen."
                    - paragraph [ref=e223]: "8. Non-Dismantle Cleaning Function: Equipped with various non-dismantle cleaning adapters, allowing non-dismantle cleaning and maintenance for multiple vehicle models."
                - listitem [ref=e224]:
