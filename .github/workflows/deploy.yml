name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Coolify Deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & verify Strapi build
        run: |
          npm ci
          NODE_ENV=production APP_KEYS=dummy,dummy,dummy,dummy npm run build
        working-directory: strapi

      - name: Install & verify Astro build
        run: |
          npm ci
          PUBLIC_STRAPI_URL=http://localhost:1337 SITE_URL=https://autodiagnostix.com.pk npx astro build
        working-directory: astro


