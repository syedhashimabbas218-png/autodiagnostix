services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autodiagnostix
      POSTGRES_USER: autodiagnostix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodiagnostix"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_URL: postgres://autodiagnostix:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/autodiagnostix_strapi
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: autodiagnostix_strapi
      DATABASE_USERNAME: autodiagnostix
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - strapi_uploads:/app/public/uploads

  astro:
    build:
      context: ./astro
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      STRAPI_URL: http://strapi:1337
      SITE_URL: ${SITE_URL:-https://autodiagnostix.com}
    depends_on:
      strapi:
        condition: service_started

volumes:
  pgdata:
  strapi_uploads:
