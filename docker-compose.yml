version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autodiagnostix
      POSTGRES_USER: autodiagnostix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodiagnostix"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://autodiagnostix:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/autodiagnostix
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-secret-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - media:/app/public/media

volumes:
  pgdata:
  media:
